<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Raid Composition</title>

    <link rel="icon" type="image/png" href="/favicon.webp">

    <link rel="stylesheet" href="../css/main.css">

    <link rel="stylesheet" href="../css/raid-composition.css">

    <link rel="stylesheet" href="../css/responsive.css">

</head>

<body>

    <main class="raid-composition-page">

        <a href="#" class="back-button" onclick="history.back(); return false;">
            ← Zurück zum Raid Monitor
        </a>

        <section class="boss-header">

            <div class="boss-info">

                <h1 id="boss-name">
                    Boss
                </h1>

                <p id="boss-difficulty">
                    Schwierigkeit
                </p>

                <div class="boss-stats">

                    <div>
                        <span>Pulls</span>
                        <strong id="boss-pulls">-</strong>
                    </div>

                    <div>
                        <span>Best Pull</span>
                        <strong id="boss-progress">-</strong>
                    </div>

                    <div>
                        <span>Letzter Pull</span>
                        <strong id="boss-date">-</strong>
                    </div>

                    <div>
                        <span>Dauer</span>
                        <strong id="boss-duration">-</strong>
                    </div>

                    <div>
                        <span>Tode</span>
                        <strong id="boss-deaths">-</strong>
                    </div>

                </div>

            </div>

            <img id="boss-image" src="" alt="Boss">

        </section>

        <section>

            <h2>

                <img src="../images/role-icons/tank-role-icon.webp" class="role-icon" alt="Tank">

                Tanks

            </h2>

            <div id="tank-container" class="player-grid"></div>

        </section>

        <section>

            <h2>

                <img src="../images/role-icons/heal-role-icon.webp" class="role-icon" alt="Heiler">

                Heiler

            </h2>

            <div id="healer-container" class="player-grid"></div>

        </section>

        <section>

            <h2>

                <img src="../images/role-icons/meele-role-icon.webp" class="role-icon" alt="DPS">

                DPS

            </h2>

            <div id="dps-container" class="player-grid"></div>

        </section>

    </main>

    <script src="/js/raid-composition.js"></script>

</body>

</html>
